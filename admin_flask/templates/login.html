<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador - SAGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container-fluid vh-100 d-flex align-items-center justify-content-center fondo">

    <div class="login-card p-4">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/logo_sage.png') }}" class="logo mb-2" alt="Logo SAGE">
            <h4 class="text-light mt-2">Panel de Administración</h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label text-light">Correo:</label>
                <input type="email" name="email" class="form-control input-custom" placeholder="admin@sage.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-light">Contraseña:</label>
                <input type="password" name="password" class="form-control input-custom" placeholder="********" required>
            </div>

            <div class="d-grid mt-4">
                <button class="btn btn-login" type="submit">Iniciar sesión</button>
            </div>
        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
