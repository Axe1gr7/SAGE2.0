<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Administrador - SAGE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Orbitron y Nunito) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<!-- Botón de cambio de tema (flotante) -->
<button class="theme-toggle-login" id="themeToggleLogin" aria-label="Cambiar tema">
    <i class="bi bi-moon-stars-fill" id="themeIconLogin"></i>
</button>

<div class="container-fluid vh-100 d-flex align-items-center justify-content-center fondo">

    <div class="login-card p-4">

        <div class="text-center mb-4">
            <!-- Contenedor con fondo oscuro fijo para proteger el logo -->
            <div>
                <img src="{{ url_for('static', filename='img/logo_sage.png') }}" class="logo" alt="Logo SAGE">
            </div>
            <h4 class="mt-2 login-title">Panel de Administración</h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Correo:</label>
                <input type="email" name="email" class="form-control input-custom" placeholder="admin@sage.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña:</label>
                <input type="password" name="password" class="form-control input-custom" placeholder="********" required>
            </div>

            <div class="d-grid mt-4">
                <button class="btn btn-login" type="submit">Iniciar sesión</button>
            </div>
        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Misma lógica de tema que en base.html
    const themeToggle = document.getElementById('themeToggleLogin');
    const themeIcon = document.getElementById('themeIconLogin');

    function applyTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.classList.remove('bi-moon-stars-fill');
            themeIcon.classList.add('bi-sun-fill');
        } else {
            document.body.classList.remove('light-mode');
            themeIcon.classList.remove('bi-sun-fill');
            themeIcon.classList.add('bi-moon-stars-fill');
        }
        localStorage.setItem('theme', theme);
    }

    // Cargar preferencia guardada
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        applyTheme(savedTheme);
    } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(prefersDark ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.contains('light-mode');
        applyTheme(isLight ? 'dark' : 'light');
    });
</script>
</body>
</html>
